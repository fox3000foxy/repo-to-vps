name: watchdog

on:
  workflow_run:
    workflows:
      - debug-runner
    types:
      - completed

permissions:
  contents: write
  actions: write

jobs:
  rerun:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'failure' || github.event.workflow_run.conclusion == 'cancelled' }}

    steps:
      - name: Re-dispatch debug-runner
        run: |
          echo "Previous run concluded: ${{ github.event.workflow_run.conclusion }}"
          curl -s -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/ssh.yml/dispatches \
            -d '{"ref":"${{ github.event.workflow_run.head_branch }}"}'
